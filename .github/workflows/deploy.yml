name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout your repository using git
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Create .env file
        run: |
          echo "EMAILJS_SERVICE_ID=${{secrets.EMAILJS_SERVICE_ID}}" >> .env
          echo "EMAILJS_TEMPLATE_ID=${{secrets.EMAILJS_TEMPLATE_ID}}" >> .env
          echo "EMAILJS_PUBLIC_KEY=${{secrets.EMAILJS_PUBLIC_KEY}}" >> .env
          echo "EMAIL_DESTINO=${{secrets.EMAIL_DESTINO}}" >> .env

      - name: Build
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
